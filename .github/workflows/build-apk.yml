name: Build Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode signing keystore
        run: |
          mkdir -p /home/runner/.keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /home/runner/.keystore/release.keystore
          ls -lh /home/runner/.keystore/release.keystore

      - name: Decode Samsung Health Sensor SDK (optional)
        run: |
          mkdir -p app/libs
          PART1="${{ secrets.SAMSUNG_SDK_B64_1 }}"
          PART2="${{ secrets.SAMSUNG_SDK_B64_2 }}"
          if [ -n "$PART1" ] && [ -n "$PART2" ]; then
            echo "${PART1}${PART2}" | base64 -d > app/libs/samsung-health-sensor-api.aar
            echo "Samsung SDK 已解码（从 SAMSUNG_SDK_B64_1 + SAMSUNG_SDK_B64_2 合并）"
            ls -lh app/libs/samsung-health-sensor-api.aar
          else
            echo "未配置 Samsung SDK Secret，编译基础版（无 ECG 功能）"
          fi

      - name: Build Release APKs（手表 + 手机）
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
          KEYSTORE_PATH: /home/runner/.keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          HEARTVOICE_API_KEY: ${{ secrets.HEARTVOICE_API_KEY }}
        run: ./gradlew :app:assembleRelease :mobile:assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          VER="${{ github.run_number }}"

          # 手表 APK
          WATCH_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -f app/libs/samsung-health-sensor-api.aar ]; then
            WATCH_NAME="WearHealthCompanion-watch-v1.0.${VER}-code${VER}-ecg.apk"
          else
            WATCH_NAME="WearHealthCompanion-watch-v1.0.${VER}-code${VER}-basic.apk"
          fi
          cp "$WATCH_APK" "artifacts/$WATCH_NAME"

          # 手机 APK
          MOBILE_APK=$(find mobile/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -f "$MOBILE_APK" ]; then
            MOBILE_NAME="WearHealthCompanion-mobile-v1.0.${VER}-code${VER}.apk"
            cp "$MOBILE_APK" "artifacts/$MOBILE_NAME"
          else
            echo "警告：手机 APK 构建失败或未找到"
          fi

          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WearHealthCompanion-apk
          path: artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release (on push to main)
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: "Build #${{ github.run_number }} (v1.0.${{ github.run_number }})"
          tag_name: "build-${{ github.run_number }}"
          generate_release_notes: true
          prerelease: false

      - name: Create GitHub Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
