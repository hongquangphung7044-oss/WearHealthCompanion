name: Build Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 用于创建 Release 和回写版本号

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode signing keystore
        run: |
          mkdir -p $HOME/.keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/.keystore/release.keystore
          ls -lh $HOME/.keystore/release.keystore

      - name: Build Release APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
          KEYSTORE_PATH: ${{ format('{0}/.keystore/release.keystore', env.HOME) }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_PATH" "artifacts/WearHealthCompanion-v1.0.${{ github.run_number }}-code${{ github.run_number }}.apk"
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WearHealthCompanion-apk
          path: artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

      - name: Create GitHub Release (on push to main)
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: "Build #${{ github.run_number }} (v1.0.${{ github.run_number }})"
          tag_name: "build-${{ github.run_number }}"
          generate_release_notes: true
          prerelease: false
