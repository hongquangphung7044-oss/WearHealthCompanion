name: Build paired release APKs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode release signing key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /home/runner/.keystore
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /home/runner/.keystore/release.keystore

      - name: Decode Samsung Health Sensor SDK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/libs
          test -n "${{ secrets.SAMSUNG_SDK_B64_1 }}"
          test -n "${{ secrets.SAMSUNG_SDK_B64_2 }}"
          printf '%s%s' "${{ secrets.SAMSUNG_SDK_B64_1 }}" "${{ secrets.SAMSUNG_SDK_B64_2 }}" | base64 --decode > app/libs/samsung-health-sensor-api.aar

      - name: Build both signed APKs
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.1.${{ github.run_number }}
          KEYSTORE_PATH: /home/runner/.keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :mobileApp:assembleRelease --no-daemon --stacktrace

      - name: Collect APKs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk "artifacts/WearHealthCompanion-wear-v1.1.${{ github.run_number }}-code${{ github.run_number }}.apk"
          cp mobileApp/build/outputs/apk/release/mobileApp-release.apk "artifacts/WearHealthCompanion-mobile-v1.1.${{ github.run_number }}-code${{ github.run_number }}.apk"
          ls -lh artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: WearHealthCompanion-apks
          path: artifacts/*.apk
          retention-days: 30

      - name: Create release
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: Build #${{ github.run_number }} (v1.1.${{ github.run_number }})
          tag_name: build-${{ github.run_number }}
          generate_release_notes: true
