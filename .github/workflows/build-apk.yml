name: Build Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode signing keystore
        run: |
          mkdir -p /home/runner/.keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /home/runner/.keystore/release.keystore
          ls -lh /home/runner/.keystore/release.keystore

      - name: Decode Samsung Health Sensor SDK
        run: |
          set -euo pipefail
          mkdir -p app/libs
          PART1="${{ secrets.SAMSUNG_SDK_B64_1 }}"
          PART2="${{ secrets.SAMSUNG_SDK_B64_2 }}"
          test -n "$PART1"
          test -n "$PART2"
          printf '%s%s' "$PART1" "$PART2" | base64 -d > app/libs/samsung-health-sensor-api.aar
          test -s app/libs/samsung-health-sensor-api.aar
          echo "Samsung SDK 已解码"
          ls -lh app/libs/samsung-health-sensor-api.aar

      - name: Build Release APKs（手表 + 手机）
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
          KEYSTORE_PATH: /home/runner/.keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :shared:testReleaseUnitTest :app:assembleRelease :mobile:assembleRelease --no-daemon --stacktrace

      - name: Rename and verify APKs
        run: |
          set -euo pipefail
          mkdir -p artifacts
          VER="${{ github.run_number }}"

          mapfile -t WATCH_APKS < <(find app/build/outputs/apk/release -type f -name "*.apk")
          mapfile -t MOBILE_APKS < <(find mobile/build/outputs/apk/release -type f -name "*.apk")
          test "${#WATCH_APKS[@]}" -eq 1
          test "${#MOBILE_APKS[@]}" -eq 1
          test -s app/libs/samsung-health-sensor-api.aar

          WATCH_NAME="WearHealthCompanion-watch-v1.0.${VER}-code${VER}-ecg.apk"
          MOBILE_NAME="WearHealthCompanion-mobile-v1.0.${VER}-code${VER}.apk"
          cp "${WATCH_APKS[0]}" "artifacts/$WATCH_NAME"
          cp "${MOBILE_APKS[0]}" "artifacts/$MOBILE_NAME"

          test -s "artifacts/$WATCH_NAME"
          test -s "artifacts/$MOBILE_NAME"
          test "$(find artifacts -maxdepth 1 -type f -name '*.apk' | wc -l)" -eq 2
          sha256sum artifacts/*.apk
          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WearHealthCompanion-apk
          path: artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release (on push to main)
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: "Build #${{ github.run_number }} (v1.0.${{ github.run_number }})"
          tag_name: "build-${{ github.run_number }}"
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: false

      - name: Create GitHub Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
